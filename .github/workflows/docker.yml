name: Docker Homework CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Homeworks/Docker/docker-compose.yml'
      - 'Homeworks/Docker/init-db/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

jobs:
  validate-docker-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Start PostgreSQL via Docker Compose
        run: |
          cd Homeworks/Docker
          docker compose up -d

      - name: Wait for DB readiness
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if docker compose -f Homeworks/Docker/docker-compose.yml exec db pg_isready -U user -d homework; then
              echo "PostgreSQL is ready!"
              exit 0
            fi
            echo "Attempt $i: waiting..."
            sleep 2
          done
          echo "Error: PostgreSQL did not become ready after 30 attempts."
          exit 1
          
      - name: "Verify migration: check for expected tables"
        run: |
          echo "Checking for expected tables..."
          TABLES=$(docker compose -f Homeworks/Docker/docker-compose.yml exec db psql -U user -d homework -t -c "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public';")
          
          if echo "$TABLES" | grep -q "users" && echo "$TABLES" | grep -q "tasks"; then
            echo "Migration successful: tables 'users' and 'tasks' exist"
          else
            echo "Migration failed: expected tables not found"
            echo "Found tables:"
            echo "$TABLES"
            exit 1 
          fi

      - name: Show tables (for logging)
        run: docker compose -f Homeworks/Docker/docker-compose.yml exec db psql -U user -d homework -c "\dt"

      - name: Cleanup resources
        if: always()
        run: docker compose -f Homeworks/Docker/docker-compose.yml down -v